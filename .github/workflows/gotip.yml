name: gotip

on:
  push:
    branches:
      - main
    paths:
      - gotip/*
      - .github/workflows/gotip.yml
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * *"

env:
  BUILD_VERSION: "nightly"
  DOCKER_CLI_EXPERIMENTAL: enabled
  REPOSITORY: ${{ github.actor }}/${{ github.workflow }}
  UPSTREAM_REPO: https://github.com/golang/go.git

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions: read-all

jobs:
  build:
    # Build each platform on its own runner so they run in parallel instead of
    # contending for a single runner's CPUs. amd64/arm64 build natively; only
    # arm/v7 (Ampere arm64 runners cannot run 32-bit code) and s390x emulate.
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-26.04
            qemu: false
          - platform: linux/arm64
            runner: ubuntu-26.04-arm
            qemu: false
          - platform: linux/arm/v7
            runner: ubuntu-26.04
            qemu: true
          - platform: linux/s390x
            runner: ubuntu-26.04
            qemu: true
    runs-on: ${{ matrix.runner }}
    permissions:
      packages: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          disable-telemetry: true
          allowed-endpoints:
            95s5acprodeus1file6.blob.core.windows.net:443
            api.github.com:443
            artifactcache.actions.githubusercontent.com:443
            auth.docker.io:443
            dl-cdn.alpinelinux.org:443
            docker-images-prod.6aa30f8b08e16409b46e0173d6de2f56.r2.cloudflarestorage.com:443
            ghcr.io:443
            github.com:443
            pkg-containers.githubusercontent.com:443
            go.googlesource.com:443
            production.cloudflare.docker.com:443
            production.cloudfront.docker.com:443
            proxy.golang.org:443
            registry-1.docker.io:443
            sum.golang.org:443
            zrdfepirv2dm3prdstr08.blob.core.windows.net:443
            zrdfepirv2bn4prdstr02.blob.core.windows.net:443

      - name: Source checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Prepare platform name
        run: |
          platform="${{ matrix.platform }}"
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Setup QEMU
        id: qemu
        if: ${{ matrix.qemu }}
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Setup Buildx
        id: buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Set Docker metadata
        id: docker_meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REPOSITORY }}
          labels: |
            org.opencontainers.image.version=${{ env.BUILD_VERSION }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=${{ env.REPOSITORY }}

      - name: GitHub login
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ github.workflow }}
          platforms: ${{ matrix.platform }}
          build-args: |
            BUILD_VERSION
          sbom: true
          provenance: true
          labels: ${{ steps.docker_meta.outputs.labels }}
          # Push untagged by digest; the merge job stitches the digests into the
          # tagged manifest lists so :latest is never overwritten per-platform.
          outputs: type=image,name=ghcr.io/${{ env.REPOSITORY }},push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}

      - name: Export digest
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-26.04
    permissions:
      packages: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          disable-telemetry: true
          allowed-endpoints:
            95s5acprodeus1file6.blob.core.windows.net:443
            api.github.com:443
            auth.docker.io:443
            ghcr.io:443
            github.com:443
            pkg-containers.githubusercontent.com:443
            production.cloudflare.docker.com:443
            production.cloudfront.docker.com:443
            registry-1.docker.io:443
            zrdfepirv2dm3prdstr08.blob.core.windows.net:443
            zrdfepirv2bn4prdstr02.blob.core.windows.net:443

      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Setup Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Get commit short hash from remote repo
        id: get-hash
        run: echo "hash=$(git ls-remote ${{ env.UPSTREAM_REPO }} HEAD | awk '{print $1}' | head -c 8)" >> $GITHUB_OUTPUT

      - name: GitHub login
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: DockerHub login
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Create and push manifest lists
        working-directory: /tmp/digests
        env:
          HASH: ${{ steps.get-hash.outputs.hash }}
        run: |
          for reg in docker.io ghcr.io; do
            docker buildx imagetools create \
              -t "${reg}/${REPOSITORY}:${HASH}" \
              -t "${reg}/${REPOSITORY}:${BUILD_VERSION}" \
              -t "${reg}/${REPOSITORY}:latest" \
              $(printf "ghcr.io/${REPOSITORY}@sha256:%s " *)
          done

      - name: Inspect image
        run: docker buildx imagetools inspect "ghcr.io/${REPOSITORY}:latest"
